id: hero
name: Hero Section
fields:
  title:
    name: Title
    type: string
    required: true
    settings:
      placeholder: "Enter the hero title"
  subtitle:
    name: Subtitle
    type: textarea
    required: false
    settings:
      rows: 3
      placeholder: "Enter a subtitle"
  background_image:
    name: Background Image
    type: image
    required: false
    settings:
      accept: "image/*"
